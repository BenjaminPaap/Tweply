stages:
  - build
  - docker
  - deploy

variables:
  IMAGE: registry.gitlab.paap.one/tweply/app

# ── Build ─────────────────────────────────────────────────────────────────────
# Requires a macOS GitLab runner with Xcode installed.
# Code signing must be configured on the runner (Developer ID certificate in
# the system keychain). Remove the CODE_SIGN_* overrides once signing is set up.

build:
  stage: build
  tags: [macos]
  script:
    - xcodebuild build
        -project TweplySwift.xcodeproj
        -scheme Tweply
        -configuration Release
        -derivedDataPath build
        CODE_SIGN_IDENTITY=""
        CODE_SIGNING_REQUIRED=NO
        CODE_SIGNING_ALLOWED=NO
    - mkdir -p dist
    - ditto -c -k --sequesterRsrc --keepParent
        build/Build/Products/Release/Tweply.app
        dist/Tweply.zip
  artifacts:
    paths:
      - dist/Tweply.zip
    expire_in: 1h
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Docker ────────────────────────────────────────────────────────────────────

docker:
  stage: docker
  tags: [docker]
  needs: [build]
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.paap.one
    - docker build -t $IMAGE:$CI_COMMIT_SHORT_SHA -t $IMAGE:latest .
    - docker push $IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Deploy ────────────────────────────────────────────────────────────────────
# Requires KUBECONFIG to be set as a CI/CD variable (file type).

deploy:
  stage: deploy
  tags: [kubernetes]
  needs: [docker]
  script:
    - helm upgrade --install tweply infrastructure/helm
        --namespace tweply
        --create-namespace
        --set image.tag=$CI_COMMIT_SHORT_SHA
        --wait
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
