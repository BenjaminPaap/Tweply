stages:
  - docker
  - deploy

variables:
  IMAGE: registry.gitlab.paap.one/benjamin/tweply

# ── Docker ────────────────────────────────────────────────────────────────────
# Expects dist/Tweply.zip to be committed to the repository.
# Build locally, zip, commit, and push to trigger a new deployment.

docker:
  stage: docker
  script:
    - cd dist && zip -r -y Tweply.zip Tweply.app && cd ..
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.paap.one
    - docker build --build-arg VERSION=$CI_COMMIT_SHORT_SHA -t $IMAGE:$CI_COMMIT_SHORT_SHA -t $IMAGE:latest .
    - docker push $IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE:latest
    - |
      curl --fail --silent \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --upload-file dist/Tweply.zip \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/tweply/${CI_COMMIT_SHORT_SHA}/Tweply.zip"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Deploy ────────────────────────────────────────────────────────────────────
# Requires KUBECONFIG to be set as a CI/CD variable (file type).

deploy:
  stage: deploy
  needs: [docker]
  script:
    - helm upgrade --install tweply infrastructure/helm
        --namespace tweply
        --create-namespace
        --set image.tag=$CI_COMMIT_SHORT_SHA
        --wait
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
