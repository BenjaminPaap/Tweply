name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -project TweplySwift.xcodeproj \
            -scheme Tweply \
            -configuration Release \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package
        run: |
          cd build/Build/Products/Release
          zip -r --symlinks Tweply.zip Tweply.app

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release/Tweply.zip
          generate_release_notes: true
